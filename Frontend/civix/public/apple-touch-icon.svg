<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="180" height="180" rx="40" fill="url(#logoGradient2)" />
  
  <!-- Decorative Ring -->
  <circle cx="90" cy="90" r="68" fill="none" stroke="url(#accentGradient2)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Letter C -->
  <path
    d="M 117 63 
       A 30 30 0 1 1 117 117
       L 117 117
       A 30 30 0 0 0 117 63
       L 130 68
       A 40 40 0 0 1 130 112
       L 130 112
       A 40 40 0 1 0 130 68
       Z"
    fill="white"
    opacity="0.95"
  />
  
  <!-- Inner accent -->
  <path
    d="M 121 71 A 27 27 0 0 1 121 109"
    stroke="url(#accentGradient2)"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    opacity="0.4"
  />
  
  <!-- Civic elements -->
  <circle cx="63" cy="90" r="3" fill="white" opacity="0.8" />
  <circle cx="63" cy="80" r="2.5" fill="white" opacity="0.6" />
  <circle cx="63" cy="100" r="2.5" fill="white" opacity="0.6" />
</svg>
