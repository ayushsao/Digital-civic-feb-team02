<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle with Gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#logoGradient)" />
  
  <!-- Decorative Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#accentGradient)" stroke-width="4" opacity="0.3"/>
  
  <!-- Letter C - Modern geometric style -->
  <path
    d="M 340 180 
       A 100 100 0 1 1 340 332
       L 340 332
       A 100 100 0 0 0 340 180
       L 370 192
       A 130 130 0 0 1 370 320
       L 370 320
       A 130 130 0 1 0 370 192
       Z"
    fill="white"
    opacity="0.95"
  />
  
  <!-- Inner accent line -->
  <path
    d="M 350 200 A 90 90 0 0 1 350 312"
    stroke="url(#accentGradient)"
    stroke-width="8"
    fill="none"
    stroke-linecap="round"
    opacity="0.4"
  />
  
  <!-- Small civic icon elements - three circles representing citizens -->
  <circle cx="180" cy="256" r="10" fill="white" opacity="0.8" />
  <circle cx="180" cy="224" r="8" fill="white" opacity="0.6" />
  <circle cx="180" cy="288" r="8" fill="white" opacity="0.6" />
</svg>
